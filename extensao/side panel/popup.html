<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>


    <div class="container">

        <h2>Leads</h2>

        <div id="searchArea">
            <div class="field-container">
                <div class="input-wrapper">
                    <input type="text" id="searchTerm" placeholder="Busque aqui">
                    <button id="searchBtn" class="search-icon" title="Buscar">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <use href="#icon-search"></use>
                        </svg>
                    </button>
                    <button id="btnManageSites" class="btn-secondary" title="Configuração de busca">
                        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                            <use href="#icon-filter"></use>
                        </svg>
                    </button>
                </div>
            </div>
        </div>



        <section class="recent-searches">
            <div class="history-header">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="#icon-history"></use>
                </svg>
                <span>Histórico</span>
            </div>
            <div id="historicoCard">
                <p>Carregando histórico...</p>

            </div>
        </section>

        <div id="manageSitesArea">
            <button id="btnBackManage" class="icon-back" title="Voltar">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="#icon-arrow-left"></use>
                </svg>
            </button>
            <h2>Configuração de busca</h2>

            <div class="platform-card">
                <div class="platform-info">
                    <span class="platform-icon">
                        <svg width="20" height="20" fill="currentColor">
                            <use href="#icon-google"></use>
                        </svg>
                    </span>
                    <span class="platform-name">Google</span>
                </div>
                <div class="platform-actions">
                    <label class="switch">
                        <input type="checkbox" id="toggleGoogle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="platform-card">
                <div class="platform-info">
                    <span class="platform-icon">
                        <svg width="20" height="20" fill="currentColor">
                            <use href="#icon-linkedin"></use>
                        </svg>
                    </span>
                    <span class="platform-name">LinkedIn</span>
                </div>
                <div class="platform-actions">
                    <button class="btn-login-info" data-platform="linkedin" title="Informação sobre login">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <use href="#icon-alert-circle"></use>
                        </svg>
                    </button>
                    <label class="switch">
                        <input type="checkbox" id="toggleLinkedin">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="platform-card">
                <div class="platform-info">
                    <span class="platform-icon">
                        <svg width="20" height="20" fill="currentColor">
                            <use href="#icon-instagram"></use>
                        </svg>
                    </span>
                    <span class="platform-name">Instagram</span>
                </div>
                <div class="platform-actions">
                    <button class="btn-login-info" data-platform="instagram" title="Informação sobre login">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <use href="#icon-alert-circle"></use>
                        </svg>
                    </button>
                    <label class="switch">
                        <input type="checkbox" id="toggleInstagram">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js" type="module"></script>
</body>

</html>
